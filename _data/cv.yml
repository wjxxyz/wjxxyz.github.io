    Publications:
      - title: "SegMoDiff: Semantic-Faithful Text-to-Motion Generation via Segmented Raw-Sequence Diffusion"
        authors:
          - Jiaxin Wang (First Author)
        publisher: ACM Multimedia (ACM MM) 2026 — Accepted
        releaseDate: 2026
        summary: A text-to-motion diffusion framework operating directly on segmented raw sequences, with SegMoDiT, overlapping contextual attention, segment-wise text enhancement, and distribution matching distillation for faster, semantically faithful generation.

      - title: Learning Stochastic Bridges for Video Object Removal via Video-to-Video Translation
        authors:
          - "Zijie Lou, Xiangwei Feng, Jiaxin Wang, et al. (Second Author)"
        publisher: International Conference on Machine Learning (ICML) 2026 — Accepted
        releaseDate: 2026
        url: https://bridgeremoval.github.io/
        summary: Reformulates video object removal as a video-to-video translation task via an SDE-based stochastic bridge, leveraging input priors and adaptive mask modulation, with the BridgeRemoval-Bench benchmark.

